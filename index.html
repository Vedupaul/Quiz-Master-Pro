<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Quiz Application | Test Your Knowledge</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Theme Toggle -->
    <div class="theme-toggle-wrapper">
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark/light mode">
            <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <circle cx="12" cy="12" r="5"></circle>
                <line x1="12" y1="1" x2="12" y2="3"></line>
                <line x1="12" y1="21" x2="12" y2="23"></line>
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                <line x1="1" y1="12" x2="3" y2="12"></line>
                <line x1="21" y1="12" x2="23" y2="12"></line>
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
            <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
        </button>
    </div>

    <!-- Animated Background -->
    <div class="background-gradient"></div>

    <!-- Main Container -->
    <main class="container">
        <!-- Start Screen -->
        <section class="screen start-screen active" id="startScreen">
            <div class="start-content">
                <div class="logo-animate">
                    <div class="logo">Q</div>
                </div>
                <h1 class="title-main">Quiz Master Pro</h1>
                <p class="subtitle">Challenge yourself with premium knowledge challenges</p>
                
                <div class="stats-preview">
                    <div class="stat-item">
                        <span class="stat-number">10</span>
                        <span class="stat-label">Questions</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-number">4</span>
                        <span class="stat-label">Options Each</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-number">∞</span>
                        <span class="stat-label">Attempts</span>
                    </div>
                </div>

                <button class="btn btn-primary btn-large" id="startBtn">
                    <span class="btn-text">Start Quiz</span>
                    <span class="btn-ripple"></span>
                </button>
                <p class="high-score" id="highScoreDisplay"></p>
            </div>
        </section>

        <!-- Quiz Screen -->
        <section class="screen quiz-screen" id="quizScreen">
            <div class="quiz-header">
                <div class="quiz-info">
                    <span class="question-counter" id="questionCounter">1 / 10</span>
                    <span class="timer-badge" id="timerBadge">30s</span>
                </div>
                <button class="btn-icon" id="quitBtn" aria-label="Quit quiz">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>

            <!-- Progress Bar -->
            <div class="progress-container">
                <div class="progress-bar" id="progressBar"></div>
            </div>

            <!-- Timer Circle -->
            <div class="timer-circle" id="timerCircle">
                <svg class="timer-svg" viewBox="0 0 100 100">
                    <circle class="timer-circle-bg" cx="50" cy="50" r="45"></circle>
                    <circle class="timer-circle-progress" cx="50" cy="50" r="45" id="timerProgress"></circle>
                </svg>
                <div class="timer-text" id="timerText">30</div>
            </div>

            <!-- Question Card -->
            <div class="question-card" id="questionCard">
                <h2 class="question-text" id="questionText"></h2>
                <p class="question-difficulty" id="difficultyBadge"></p>
            </div>

            <!-- Options Container -->
            <div class="options-container" id="optionsContainer"></div>

            <!-- Navigation Buttons -->
            <div class="quiz-footer">
                <button class="btn btn-secondary" id="prevBtn" disabled>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                    Previous
                </button>
                <button class="btn btn-primary" id="nextBtn" disabled>
                    Next
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                        <polyline points="12 5 19 12 12 19"></polyline>
                    </svg>
                </button>
            </div>
        </section>

        <!-- Results Screen -->
        <section class="screen results-screen" id="resultsScreen">
            <div class="results-content">
                <h1 class="results-title" id="resultsTitle">Quiz Complete!</h1>
                
                <div class="score-display">
                    <div class="score-circle" id="scoreCircle">
                        <svg class="score-ring" viewBox="0 0 100 100">
                            <circle class="score-ring-bg" cx="50" cy="50" r="45"></circle>
                            <circle class="score-ring-progress" cx="50" cy="50" r="45" id="scoreRing"></circle>
                        </svg>
                        <div class="score-text">
                            <span class="score-percentage" id="scorePercentage">0%</span>
                            <span class="score-label">Score</span>
                        </div>
                    </div>
                </div>

                <div class="results-stats">
                    <div class="result-stat">
                        <span class="stat-label">Correct Answers</span>
                        <span class="stat-value" id="correctCount">0</span>
                    </div>
                    <div class="result-stat">
                        <span class="stat-label">Total Questions</span>
                        <span class="stat-value" id="totalCount">0</span>
                    </div>
                    <div class="result-stat">
                        <span class="stat-label">Time Taken</span>
                        <span class="stat-value" id="timeTaken">0s</span>
                    </div>
                </div>

                <p class="result-message" id="resultMessage"></p>
                <p class="high-score-achieved" id="highScoreAchieved"></p>

                <div class="results-actions">
                    <button class="btn btn-secondary btn-large" id="restartBtn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <path d="M23 4v6h-6"></path>
                            <path d="M1 20v-6h6"></path>
                            <path d="M3.51 9a9 9 0 0 1 14.85-3.36M20.49 15a9 9 0 0 1-14.85 3.36"></path>
                        </svg>
                        Restart Quiz
                    </button>
                </div>
            </div>
        </section>
    </main>

    <!-- Confetti Container -->
    <div class="confetti-container" id="confettiContainer"></div>

    <script src="script.js"></script>
</body>
</html>
