apiVersion: apps/v1
kind: Deployment
metadata:
  name: quiz-master-pro
  labels:
    app: quiz-master-pro
spec:
  replicas: 2
  selector:
    matchLabels:
      app: quiz-master-pro
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0          # Zero downtime during updates
  template:
    metadata:
      labels:
        app: quiz-master-pro
    spec:
      containers:
        - name: quiz-master-pro
          image: quiz-master-pro:latest
          imagePullPolicy: IfNotPresent  # Use local image if available (minikube/kind dev)
          ports:
            - containerPort: 80
              protocol: TCP
          resources:
            requests:
              memory: "32Mi"
              cpu: "25m"
            limits:
              memory: "64Mi"
              cpu: "100m"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
