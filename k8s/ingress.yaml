apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: quiz-master-pro
  labels:
    app: quiz-master-pro
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: quiz.local        # Change to your real domain in production
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: quiz-master-pro
                port:
                  number: 80
